<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Смарт Лисиця AR - v1.6.0</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="js/components.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); color: #0ff;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .btn {
            padding: 15px 30px; border: 2px solid #0ff; background: rgba(0,255,255,0.1);
            color: #0ff; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1.2em;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>FOX HOLOGRAM</h1>
        <button class="btn" onclick="startAR()">ЗАПУСТИТИ</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; filterMinCF: 0.0001; filterBeta: 0.001;" 
        embedded vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true; antialias: true; exposure: 1.0;">
        
        <a-assets>
            <video id="foxVideo" src="assets/hologram_alpha.mp4" 
                   preload="auto" loop="true" crossorigin="anonymous" 
                   playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

<a-entity 
    id="fox-hologram"
    geometry="primitive: plane; width: 0.8; height: 1.1" 
    position="0 0 0.15" 
    material="shader: transparent-video; src: #foxVideo;">
</a-entity>
    </a-scene>

    <script>
        function startAR() {
            document.getElementById('overlay').style.display = 'none';
            const scene = document.querySelector('a-scene');
            scene.systems['mindar-image-system'].start();
            
            // Важливо: запускаємо відео відразу (в muted режимі воно дозволено)
            const v = document.querySelector('#foxVideo');
            v.play();
        }

        // Подія знаходження (як у монстрів)
        document.getElementById('target0').addEventListener("targetFound", () => {
            console.log("Лисиця активована");
            document.querySelector('#foxVideo').play();
        });
    </script>
</body>
</html>
