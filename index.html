<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Смарт Лисиця AR - Stable Edition</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #gameUI { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
        
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85); color: #0ff;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; text-align: center; pointer-events: auto;
        }

        .btn {
            padding: 16px 32px; border: 2px solid #0ff; background: rgba(0,255,255,0.1);
            color: #0ff; border-radius: 50px; cursor: pointer; font-weight: bold;
            font-size: 1.2em; pointer-events: auto; text-transform: uppercase;
        }

        #status {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #0ff; font-weight: bold; text-shadow: 0 0 5px #000;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>SMART FOX AR</h1>
        <p style="margin-bottom: 20px;">Наведіть на маркер на стіні</p>
        <button class="btn" onclick="startAR()">ЗАПУСТИТИ</button>
    </div>

    <div id="gameUI">
        <div id="status" style="display:none;">Шукаю лисицю...</div>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; filterMinCF: 0.0001; filterBeta: 0.001;" 
        embedded vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true; antialias: true;">
        
        <a-assets>
            <img id="foxImg" src="assets/fox_ar.png">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target0" mindar-image-target="targetIndex: 0">
            <a-image 
                src="#foxImg" 
                position="0 0 0.1" 
                scale="1 1 1"
                width="0.8" 
                height="1.0"
                transparent="true"
                alpha-test="0.5">
            </a-image>
            
            <a-light type="ambient" intensity="1.5"></a-light>
        </a-entity>
    </a-scene>

    <script>
        const overlay = document.getElementById('overlay');
        const status = document.getElementById('status');
        const scene = document.querySelector('a-scene');

        function startAR() {
            overlay.style.display = 'none';
            status.style.display = 'block';
            
            // Запуск системи MindAR
            const mindarSystem = scene.systems['mindar-image-system'];
            mindarSystem.start();
        }

        const target0 = document.getElementById('target0');
        target0.addEventListener("targetFound", () => {
            status.innerText = "Лисиця на стіні!";
            setTimeout(() => { status.style.display = 'none'; }, 2000);
        });

        target0.addEventListener("targetLost", () => {
            status.style.display = 'block';
            status.innerText = "Шукаю лисицю...";
        });
    </script>
</body>
</html>
