<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <title>Смарт Лисиця AR | Географія</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>

    <script src="js/components.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #000; }
        
        /* Розтягуємо камеру на весь екран без чорних смуг */
        video {
            width: 100vw !important; height: 100vh !important;
            object-fit: cover !important; position: absolute; top: 0; left: 0;
        }

        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #001a1a 0%, #000 100%);
            color: white; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; 
            text-align: center; transition: opacity 0.5s ease;
        }
        .ui-panel {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; z-index: 1001;
        }
        button {
            padding: 14px 28px; border-radius: 30px; border: 1px solid #00ffff;
            background: rgba(0, 255, 255, 0.1); color: #00ffff; font-weight: 600;
            text-transform: uppercase; cursor: pointer; backdrop-filter: blur(10px);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3); transition: all 0.2s;
        }
        #status-indicator {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            color: #00ffff; font-size: 0.9rem; z-index: 1001; text-shadow: 0 0 5px #000;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="color: #00ffff;">SMART FOX AR</h1>
        <p>Натисніть кнопку та наведіть на маркер на стіні</p>
        <button onclick="startExperience()">Запустити AR</button>
    </div>

    <div id="status-indicator" style="display:none">Пошук маркера...</div>

    <div class="ui-panel">
        <button id="audioBtn">🔊 Звук</button>
        <button id="resetBtn">🔄 Reset</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; uiScanning: #status-indicator; facingMode: environment;" 
        embedded color-space="sRGB" 
        renderer="colorManagement: true, antialias: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="hologramVideo" src="assets/hologram_alpha.mp4" 
                   loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-camera id="main-camera" position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target-sensor" mindar-image-target="targetIndex: 0"></a-entity>

        <a-entity id="world-anchor" visible="false">
            <a-entity 
                id="hologram-mesh"
                geometry="primitive: plane; width: 1.0; height: 0.5" 
                position="0 0 0.05" 
                material="shader: transparent-video; src: #hologramVideo; side: double;"
                hologram-flicker>
            </a-entity>
            <a-light type="point" color="#00ffff" intensity="0.8" position="0 0 0.5"></a-light>
        </a-entity>

    </a-scene>

    <script src="js/app.js"></script>
    <script src="js/ui-controller.js"></script>
</body>
</html>
