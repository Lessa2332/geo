<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <title>Смарт Лисиця AR</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        video { width: 100vw !important; height: 100vh !important; object-fit: cover !important; position: absolute; top: 0; left: 0; }
        #overlay { position: fixed; inset: 0; background: #000; color: #0ff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; text-align: center; }
        .ui-panel { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; z-index: 1001; }
        button { padding: 12px 24px; border: 2px solid #0ff; background: rgba(0,255,255,0.1); color: #0ff; border-radius: 25px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>SMART FOX AR</h1>
        <p>Натисніть кнопку та наведіть на маркер на стіні</p>
        <button onclick="startExperience()">ЗАПУСТИТИ</button>
    </div>

    <div class="ui-panel">
        <button id="resetBtn">🔄 Reset</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; uiLoading: no;" 
        embedded vr-mode-ui="enabled: false"
        renderer="colorManagement: true, antialias: true">
        
        <a-assets>
            <img id="hologramImage" src="assets/fox_ar.png" crossorigin="anonymous">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target-sensor" mindar-image-target="targetIndex: 0">
            <a-entity id="world-anchor" visible="false">
                
                <a-entity 
                    id="hologram-mesh"
                    geometry="primitive: plane; width: 0.5; height: 0.75" 
                    position="0 0 0.15" 
                    /* Стандартний матеріал A-Frame для прозорості (без шейдерів) */
                    material="src: #hologramImage; transparent: true; opacity: 1; alphaTest: 0.5; side: double;">
                </a-entity>
                
                <a-light type="point" color="#00ffff" intensity="1.2" position="0 0 0.4"></a-light>
                
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const sceneEl = document.querySelector('a-scene');
        const targetEl = document.querySelector('#target-sensor');
        const anchorEl = document.querySelector('#world-anchor');

        window.startExperience = () => {
            document.querySelector('#overlay').style.display = 'none';
            sceneEl.systems['mindar-image-system'].start(); 
        };

        targetEl.addEventListener("targetFound", () => {
            anchorEl.setAttribute('visible', 'true');
        });

        targetEl.addEventListener("targetLost", () => {
            // Лисиця залишається на стіні
        });

        document.querySelector('#resetBtn').addEventListener('click', () => {
            anchorEl.setAttribute('visible', 'false');
        });
    </script>
</body>
</html>
