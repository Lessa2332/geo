<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Smart Fox AR - Fixed</title>

    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <script src="js/components.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); color: #0ff;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; text-align: center;
        }
        .btn {
            padding: 15px 30px; border: 2px solid #0ff; background: rgba(0,255,255,0.1);
            color: #0ff; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 1.2em;
            pointer-events: auto;
        }
        #status {
            position: fixed; top: 20px; width: 100%; text-align: center; color: #0ff; z-index: 100;
        }
    </style>
</head>
<body>

    <div id="status"></div>

    <div id="overlay">
        <h1>SMART FOX AR</h1>
        <button class="btn" id="startBtn">ЗАПУСТИТИ</button>
    </div>

    <a-scene 
        id="mainScene"
        mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; filterMinCF: 0.0001; filterBeta: 0.001;" 
        embedded vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true; antialias: true;">
        
        <a-assets>
            <video id="foxVideo" src="assets/hologram_alpha.mp4" 
                   preload="auto" loop="true" crossorigin="anonymous" 
                   playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target0" mindar-image-target="targetIndex: 0">
            <a-entity 
                id="fox-hologram"
                geometry="primitive: plane; width: 0.8; height: 1.1" 
                position="0 0 0.15" 
                material="shader: transparent-video; src: #foxVideo;">
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const startBtn = document.getElementById('startBtn');
        const sceneEl = document.querySelector('a-scene');
        const statusEl = document.getElementById('status');
        const video = document.getElementById('foxVideo');

        // Функція запуску
        const startAR = () => {
            document.getElementById('overlay').style.display = 'none';
            statusEl.innerText = "Завантаження камери...";

            // Перевіряємо, чи система готова
            if (sceneEl.systems['mindar-image-system']) {
                sceneEl.systems['mindar-image-system'].start();
                video.play().catch(e => console.log("Чекаємо на взаємодію для звуку"));
            } else {
                // Якщо система ще не ініціалізована, спробуємо через 300мс
                setTimeout(startAR, 300);
            }
        };

        startBtn.addEventListener('click', startAR);

        // Безпечне додавання подій для таргета
        sceneEl.addEventListener('render-target-loaded', () => {
            const target0 = document.getElementById('target0');
            
            if (target0) {
                target0.addEventListener("targetFound", () => {
                    statusEl.innerText = "Лисиця активована";
                    video.play();
                });

                target0.addEventListener("targetLost", () => {
                    statusEl.innerText = "Маркер втрачено";
                });
            }
        });
    </script>
</body>
</html>
