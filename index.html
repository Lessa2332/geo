<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <title>Смарт Лисиця AR</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="js/components.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; }
        video { 
            width: 100vw !important; height: 100vh !important; 
            object-fit: cover !important; position: absolute; top: 0; left: 0; 
        }
        #overlay {
            position: fixed; inset: 0; background: #000; color: #0ff;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; text-align: center;
        }
        .ui-panel {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 1001;
        }
        button {
            padding: 12px 24px; border: 2px solid #0ff; background: rgba(0,255,255,0.1);
            color: #0ff; border-radius: 25px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>SMART FOX AR</h1>
        <button onclick="startExperience()">ЗАПУСТИТИ КАМЕРУ</button>
    </div>

    <div class="ui-panel">
        <button id="audioBtn">🔊 ЗВУК</button>
        <button id="resetBtn">🔄 СКИДАННЯ</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; uiLoading: no;" 
        embedded vr-mode-ui="enabled: false"
        renderer="colorManagement: true, antialias: true">
        
        <a-assets>
            <video id="hologramVideo" src="assets/hologram_alpha.mp4" 
                   loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target-sensor" mindar-image-target="targetIndex: 0">
            <a-entity id="world-anchor" visible="false">
                <a-entity 
                    id="hologram-mesh"
                    geometry="primitive: plane; width: 0.7; height: 1.0" 
                    position="0 0 0.05" 
                    material="shader: transparent-video; src: #hologramVideo;"
                    hologram-flicker>
                </a-entity>
                <a-light type="point" color="#0ff" intensity="1" position="0 0 0.5"></a-light>
            </a-entity>
        </a-entity>
    </a-scene>

    <script src="js/app.js"></script>
    <script src="js/ui-controller.js"></script>
</body>
</html>
