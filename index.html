<!DOCTYPE html>
<html lang="uk">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta charset="UTF-8">
    <title>Смарт Лисиця AR</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    <script src="js/components.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        /* Камера на весь екран */
        video { 
            width: 100vw !important; height: 100vh !important; 
            object-fit: cover !important; position: absolute; top: 0; left: 0; 
        }

        #overlay {
            position: fixed; inset: 0; background: radial-gradient(circle, #001a1a 0%, #000 100%);
            color: #0ff; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 1000; text-align: center;
        }

        .ui-panel {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; z-index: 1001;
        }

        button {
            padding: 12px 24px; border: 2px solid #0ff; background: rgba(0,255,255,0.1);
            color: #0ff; border-radius: 25px; cursor: pointer; font-weight: bold;
            text-transform: uppercase; backdrop-filter: blur(5px);
        }

        #status-indicator {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            color: #0ff; z-index: 1001; font-size: 0.9rem; text-shadow: 0 0 5px #000;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 style="letter-spacing: 2px;">SMART FOX AR</h1>
        <p>Натисніть кнопку та наведіть на маркер на стіні</p>
        <button onclick="startExperience()">ЗАПУСТИТИ</button>
    </div>

    <div id="status-indicator" style="display:none">Шукаю маркер...</div>

    <div class="ui-panel">
        <button id="audioBtn">🔊 ЗВУК</button>
        <button id="resetBtn">🔄 СКИДАННЯ</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: assets/targets.mind; autoStart: false; uiLoading: no;" 
        embedded vr-mode-ui="enabled: false"
        renderer="colorManagement: true, antialias: true">
        
        <a-assets>
            <video id="hologramVideo" src="assets/hologram_alpha.mp4" 
                   loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target-sensor" mindar-image-target="targetIndex: 0">
            <a-entity id="world-anchor" visible="false">
                
                <a-entity 
                    id="hologram-mesh"
                    geometry="primitive: plane; width: 0.5; height: 0.75" 
                    position="0 0 0.15" 
                    material="shader: transparent-video; src: #hologramVideo;"
                    hologram-flicker>
                </a-entity>

                <a-light type="point" color="#00ffff" intensity="1.2" position="0 0 0.4"></a-light>
                
            </a-entity>
        </a-entity>
    </a-scene>

    <script src="js/app.js"></script>
    <script src="js/ui-controller.js"></script>
</body>
</html>
